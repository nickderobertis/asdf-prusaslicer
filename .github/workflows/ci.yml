name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # Full history so `asdf plugin test` (run by `just check`) can clone the
      # committed plugin state at the PR head commit.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install PrusaSlicer Linux runtime libraries
        if: runner.os == 'Linux'
        # PrusaSlicer links WebKitGTK and OpenGL, which the Linux AppImage does
        # not bundle (the reason upstream moved to Flatpak). They must come from
        # the system even for `--help`, which loads them at process start. The
        # plugin test inside `just check` runs the installed binary, so the gate
        # needs them too.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-0 libgl1 libegl1

      # Install asdf and the developer tools pinned in .tool-versions (just,
      # shellcheck, shfmt, bats, actionlint), so `just` is available to run the
      # gate and `asdf plugin test` is available to `just check`.
      - name: Set up asdf and pinned tools
        uses: asdf-vm/actions/install@v4

      - name: Bootstrap
        run: just bootstrap

      - name: Gate
        run: just check
        env:
          # Avoids GitHub API rate limits when the plugin lists versions during
          # `asdf plugin test`. Not required for forks; listing falls back to
          # unauthenticated.
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plugin-test:
    name: plugin-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux binaries are published on GitHub only through 2.8.1; newer
          # releases are Linux/Flatpak-only upstream, so Linux pins 2.8.1.
          - os: ubuntu-latest
            version: "2.8.1"
          - os: macos-latest
            version: latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PrusaSlicer Linux runtime libraries
        if: runner.os == 'Linux'
        # PrusaSlicer links WebKitGTK and OpenGL, which the Linux AppImage does
        # not bundle (the reason upstream moved to Flatpak). They must come from
        # the system even for `--help`, which loads them at process start.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-0 libgl1 libegl1

      - name: asdf plugin test
        uses: asdf-vm/actions/plugin-test@v4
        with:
          command: prusa-slicer --help
          version: ${{ matrix.version }}
          # Optional: avoids GitHub API rate limits when listing versions.
          # Not required for forks; the listing falls back to unauthenticated.
          github_token: ${{ secrets.GITHUB_TOKEN }}
